<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version 2 - Neon UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* Theme */
:root {
  --primary: #00f5ff;
  --secondary: #ffffff;
  --bg: #020617;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
}

body {
  background: radial-gradient(circle at top, #020617, #000);
  color: var(--secondary);
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: var(--primary);
  text-shadow: 0 0 10px var(--primary);
}

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: var(--secondary);
  transition: 0.3s;
}

.nav-links a:hover {
  color: var(--primary);
}

/* Hero */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 45px;
  text-shadow: 0 0 20px var(--primary);
}

.hero p {
  opacity: 0.7;
  margin-top: 10px;
}

/* Button */
.btn {
  margin-top: 25px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: var(--primary);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px var(--primary);
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px var(--primary);
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
  padding: 50px;
}

.card {
  background: var(--card);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-12px);
  box-shadow: 0 0 20px var(--primary);
}

.card h3 {
  margin-bottom: 10px;
  color: var(--primary);
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">MyApp V2</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- Hero -->
<section class="hero">
  <h1>Version 2 UI ⚡</h1>
  <p>Next level modern neon interface design</p>
  <button class="btn">Explore Now</button>
</section>

<!-- Cards -->
<section class="cards">
  <div class="card">
    <h3>Ultra Fast</h3>
    <p>Blazing fast performance with smooth animations.</p>
  </div>

  <div class="card">
    <h3>Glass UI</h3>
    <p>Modern glassmorphism design.</p>
  </div>

  <div class="card">
    <h3>Fully Responsive</h3>
    <p>Works on mobile, tablet and desktop.</p>
  </div>
</section>

<!-- Footer -->
<div class="footer">
  © 2026 MyApp Version 2
</div>

</body>
</html>
