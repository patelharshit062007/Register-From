<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Registration Form</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #87CEEB, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Glass Card */
.container {
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

.container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* Input Box */
.input-box {
  position: relative;
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border: none;
  border-bottom: 2px solid #555;
  outline: none;
  background: transparent;
  font-size: 14px;
}

/* Floating Label */
.input-box label {
  position: absolute;
  left: 0;
  top: 10px;
  color: #555;
  font-size: 14px;
  transition: 0.3s;
}

.input-box input:focus ~ label,
.input-box input:valid ~ label {
  top: -10px;
  font-size: 12px;
  color: #007BFF;
}

/* Button */
button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #007BFF, #00C6FF);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Responsive */
@media(max-width: 400px) {
  .container {
    width: 90%;
  }
}
</style>

</head>
<body>

<div class="container">
  <h2>Register</h2>

  <form>
    <div class="input-box">
      <input type="text" required>
      <label>Full Name</label>
    </div>

    <div class="input-box">
      <input type="email" required>
      <label>Email</label>
    </div>

    <div class="input-box">
      <input type="password" required>
      <label>Password</label>
    </div>

    <div class="input-box">
      <input type="tel" required>
      <label>Phone Number</label>
    </div>

    <button type="submit">Sign Up</button>
  </form>
</div>

</body>
</html>
