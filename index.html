<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satic AI Frontend Internship - Day 4</title>
    <style>
        /* 1. RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 2. FORM CONTAINER (Step 6: Alignment & Spacing) */
        .registration-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        /* 3. VISUAL HIERARCHY (Step 4) */
        .registration-card h2 {
            color: #1a1a1a;
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }

        .registration-card p {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        /* 4. INPUT EFFECTS & TRANSITIONS (Step 2 & 5) */
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            outline: none;
            /* Step 5: Smooth Transition */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Step 2: Highlight on focus */
        input:focus {
            border-color: #4f46e5;
            background-color: #f9fafb;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* 5. BUTTON EFFECTS (Step 3 & 5) */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            /* Step 5: Smooth Transition */
            transition: all 0.3s ease;
        }

        /* Step 3: Hover & Active Effects */
        .submit-btn:hover {
            background-color: #4338ca;
            transform: translateY(-2px); /* Slight lift */
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.98); /* Slight scale down on click */
        }

        /* Responsive spacing */
        @media (max-width: 480px) {
            .registration-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="registration-card">
        <h2>Create Account</h2>
        <p>Join the Satic AI community today.</p>

        <form>
            <div class="form-group">
                <label for="username">Satic ID / Username</label>
                <input type="text" id="username" placeholder="e.g. satic_user_01" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn">Register Now</button>
        </form>
    </div>

</body>
</html>
