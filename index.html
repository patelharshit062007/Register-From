<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Premium Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Card */
.container {
  width: 360px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  color: white;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.container h2 {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 600;
}

/* Input Box */
.input-box {
  position: relative;
  margin-bottom: 25px;
}

.input-box input {
  width: 100%;
  padding: 12px 10px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 14px;
}

.input-box input::placeholder {
  color: transparent;
}

/* Floating Label */
.input-box label {
  position: absolute;
  top: 12px;
  left: 10px;
  font-size: 14px;
  color: #ddd;
  transition: 0.3s;
}

.input-box input:focus + label,
.input-box input:valid + label {
  top: -8px;
  left: 8px;
  font-size: 12px;
  background: #0072ff;
  padding: 2px 6px;
  border-radius: 5px;
}

/* Password Toggle */
.toggle {
  position: absolute;
  right: 10px;
  top: 12px;
  cursor: pointer;
  font-size: 14px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
  color: #ddd;
}

.footer a {
  color: #fff;
  text-decoration: none;
  font-weight: 500;
}

/* Responsive */
@media(max-width: 400px) {
  .container {
    width: 90%;
  }
}
</style>

</head>
<body>

<div class="container">
  <h2>Create Account</h2>

  <form>
    <div class="input-box">
      <input type="text" required>
      <label>Full Name</label>
    </div>

    <div class="input-box">
      <input type="email" required>
      <label>Email</label>
    </div>

    <div class="input-box">
      <input type="password" id="password" required>
      <label>Password</label>
      <span class="toggle" onclick="togglePassword()">👁</span>
    </div>

    <div class="input-box">
      <input type="tel" required>
      <label>Phone Number</label>
    </div>

    <button type="submit">Sign Up</button>

    <div class="footer">
      Already have an account? <a href="#">Login</a>
    </div>
  </form>
</div>

<script>
function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
