<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satic AI - Premium Submission Form</title>
    
    <!-- Premium CSS Styles (Merged) -->
    <style>
        /* 1. Global Reset & Premium Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #080c14);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            overflow: hidden;
        }

        /* 2. Glassmorphism Form Container (Task Step 4 & 6) */
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin-bottom: 8px; font-weight: 700; letter-spacing: -0.5px; }
        .accent { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; opacity: 0.8; }

        /* 3. Input Visual Effects (Task Step 2 & 5) */
        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 0;
            font-size: 1rem;
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth Transition */
        }

        /* Focus & Polish Highlights (Step 2) */
        .input-group input:focus {
            border-bottom-color: #10b981;
        }

        .input-group label {
            position: absolute;
            top: 12px;
            left: 0;
            color: #64748b;
            pointer-events: none;
            transition: 0.3s ease;
        }

        /* Floating Label Animation */
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -14px;
            font-size: 0.75rem;
            color: #10b981;
            font-weight: 600;
        }

        /* 4. Button Hover & Scale Effects (Task Step 3) */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 12px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Springy transition */
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .submit-btn:hover {
            transform: scale(1.03); /* Slight scale (Step 3) */
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.4); /* Shadow change (Step 3) */
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <form>
            <h2>Satic AI <span class="accent">Intern</span></h2>
            <p class="subtitle">Submission Portal • Day 4 Polish</p>

            <div class="input-group">
                <input type="text" id="satic-id" required placeholder=" ">
                <label for="satic-id">Satic ID</label>
            </div>

            <div class="input-group">
                <input type="text" id="name" required placeholder=" ">
                <label for="name">Full Name</label>
            </div>

            <div class="input-group">
                <input type="text" id="project-title" required placeholder=" ">
                <label for="project-title">Project Title</label>
            </div>

            <div class="input-group">
                <input type="url" id="github-link" required placeholder=" ">
                <label for="github-link">GitHub Repository URL</label>
            </div>

            <button type="submit" class="submit-btn">Submit Project</button>
        </form>
    </div>

</body>
</html>
