<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Registration</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #87CEEB, #ffffff);
}

/* Container */
.container {
  width: 350px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

/* Dark Mode Button */
.toggle-btn {
  background: #0d1b2a;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 25px;
  width: 100%;
  margin-bottom: 15px;
  cursor: pointer;
}

/* Title */
h2 {
  margin-bottom: 20px;
  color: #0d1b2a;
}

/* Input Fields */
.input-box {
  position: relative;
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #f1f9ff;
  font-size: 14px;
}

/* Eye Button */
.input-box span {
  position: absolute;
  right: 10px;
  top: 12px;
  cursor: pointer;
}

/* Buttons */
.btn-group {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.btn {
  width: 48%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
}

/* Register Button */
.register {
  background: linear-gradient(135deg, #00b4db, #0083b0);
  color: white;
}

/* Reset Button */
.reset {
  background: #0d1b2a;
  color: white;
}

/* DARK MODE */
.dark {
  background: #0d1b2a;
}

.dark .container {
  background: #1b263b;
  color: white;
}

.dark input {
  background: #415a77;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <button class="toggle-btn" onclick="toggleMode()">🌙 Dark Mode</button>

  <h2>✨ Premium Registration</h2>

  <div class="input-box">
    <input type="text" placeholder="Full Name">
  </div>

  <div class="input-box">
    <input type="email" placeholder="Email">
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Password">
    <span onclick="togglePassword()">👁️</span>
  </div>

  <div class="input-box">
    <input type="text" placeholder="Phone Number">
  </div>

  <div class="btn-group">
    <button class="btn register">🚀 Register</button>
    <button class="btn reset">🔄 Reset</button>
  </div>
</div>

<script>
function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
