<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Registration | Day 4 Polish</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #87CEEB, #ffffff);
  transition: background 0.5s ease; /* Smooth background shift for Dark Mode */
}

/* Container */
.container {
  width: 380px; /* Slightly wider for better spacing */
  padding: 40px 30px;
  border-radius: 24px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(15px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
  text-align: center;
  transition: transform 0.3s ease, background 0.4s ease;
}

/* Visual Hierarchy: More visible heading */
h2 {
  margin-bottom: 30px;
  color: #0d1b2a;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

/* Dark Mode Toggle Button */
.toggle-btn {
  background: #0d1b2a;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
  font-size: 12px;
  margin-bottom: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.toggle-btn:hover {
  background: #415a77;
  transform: translateY(-2px);
}

/* Input Fields & Visual Polish */
.input-box {
  position: relative;
  margin-bottom: 20px; /* Improved spacing */
}

.input-box input {
  width: 100%;
  padding: 14px 18px;
  border-radius: 12px;
  border: 2px solid transparent; /* Prepared for focus border */
  outline: none;
  background: #f1f9ff;
  font-size: 14px;
  color: #333;
  transition: all 0.3s ease; /* Smooth transition for effects */
}

/* Day 4 Task: Input Effects on Focus */
.input-box input:focus {
  background: #ffffff;
  border-color: #00b4db;
  box-shadow: 0 0 12px rgba(0, 180, 219, 0.2);
}

/* Password Eye Icon */
.input-box span {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.3s;
}

.input-box span:hover {
  opacity: 1;
}

/* Buttons Group */
.btn-group {
  display: flex;
  justify-content: space-between;
  margin-top: 25px;
}

.btn {
  width: 48%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Added a slight bounce */
}

/* Register Button - Day 4 Hover Effects */
.register {
  background: linear-gradient(135deg, #00b4db, #0083b0);
  color: white;
  box-shadow: 0 4px 15px rgba(0, 180, 219, 0.3);
}

.register:hover {
  transform: scale(1.05); /* Slight scale */
  box-shadow: 0 8px 20px rgba(0, 180, 219, 0.4); /* Deeper shadow */
  filter: brightness(1.1);
}

/* Reset Button */
.reset {
  background: #0d1b2a;
  color: white;
}

.reset:hover {
  background: #1b263b;
  transform: translateY(-2px);
}

/* DARK MODE OVERRIDES */
.dark {
  background: #0b0d17;
}

.dark .container {
  background: #1b263b;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.dark h2, .dark .toggle-btn {
  color: white;
}

.dark .input-box input {
  background: #415a77;
  color: white;
}

.dark .input-box input::placeholder {
  color: #ccc;
}

.dark .input-box input:focus {
  background: #4e6a8e;
  border-color: #00b4db;
}
</style>
</head>

<body>

<div class="container">
  <button class="toggle-btn" onclick="toggleMode()" id="modeToggle">🌙 Dark Mode</button>

  <h2>✨ Premium Registration</h2>

  <div class="input-box">
    <input type="text" placeholder="Full Name" required>
  </div>

  <div class="input-box">
    <input type="email" placeholder="Email" required>
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Password" required>
    <span onclick="togglePassword()">👁️</span>
  </div>

  <div class="input-box">
    <input type="text" placeholder="Phone Number" required>
  </div>

  <div class="btn-group">
    <button class="btn register">🚀 Register</button>
    <button class="btn reset" onclick="location.reload()">🔄 Reset</button>
  </div>
</div>

<script>
// Toggle Password Visibility
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

// Dark Mode Logic
function toggleMode() {
  const body = document.body;
  const btn = document.getElementById("modeToggle");
  
  body.classList.toggle("dark");
  
  if (body.classList.contains("dark")) {
    btn.innerHTML = "☀️ Light Mode";
  } else {
    btn.innerHTML = "🌙 Dark Mode";
  }
}
</script>

</body>
</html>
