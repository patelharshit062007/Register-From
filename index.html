<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version 1 - Premium UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* Theme Colors */
:root {
  --primary: #7c3aed;
  --secondary: #ffffff;
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: var(--primary);
}

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: var(--text);
  transition: 0.3s;
}

.nav-links a:hover {
  color: var(--primary);
}

/* Hero Section */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 15px;
}

.hero p {
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: var(--primary);
  color: var(--secondary);
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* Cards Section */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card h3 {
  margin-bottom: 10px;
  color: var(--primary);
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">MyApp</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- Hero -->
<section class="hero">
  <h1>Welcome to Version 1 🚀</h1>
  <p>Modern UI with premium look and smooth design</p>
  <button class="btn">Get Started</button>
</section>

<!-- Cards -->
<section class="cards">
  <div class="card">
    <h3>Fast Performance</h3>
    <p>Optimized and smooth experience for users.</p>
  </div>

  <div class="card">
    <h3>Modern Design</h3>
    <p>Clean and attractive UI design.</p>
  </div>

  <div class="card">
    <h3>Easy Customization</h3>
    <p>Change colors and layout easily.</p>
  </div>
</section>

<!-- Footer -->
<div class="footer">
  © 2026 MyApp | All Rights Reserved
</div>

</body>
</html>
