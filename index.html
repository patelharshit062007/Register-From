<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #87CEEB, #ffffff);
}

/* Form Card */
.container {
  width: 90%;
  max-width: 400px;
  background: #ffffff;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* Inputs */
.input-box {
  width: 100%;
  margin-bottom: 15px;
}

.input-box input,
.input-box select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

.input-box input:focus,
.input-box select:focus {
  border-color: #00bfff;
  box-shadow: 0 0 5px rgba(0,191,255,0.5);
}

/* Password eye */
.password-box {
  position: relative;
}

.password-box span {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* Gender */
.gender {
  margin: 10px 0;
}

.gender label {
  margin-right: 10px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(90deg, #00bfff, #87cefa);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}
</style>

</head>
<body>

<div class="container">
  <h2>Register</h2>

  <div class="input-box">
    <input type="text" placeholder="Full Name">
  </div>

  <div class="input-box">
    <input type="email" placeholder="Email">
  </div>

  <div class="input-box password-box">
    <input type="password" id="password" placeholder="Password">
    <span onclick="togglePassword()">👁️</span>
  </div>

  <div class="gender">
    <label><input type="radio" name="gender"> Male</label>
    <label><input type="radio" name="gender"> Female</label>
    <label><input type="radio" name="gender"> Other</label>
  </div>

  <div class="input-box">
    <select>
      <option>Course / Interest</option>
      <option>Web Development</option>
      <option>App Development</option>
      <option>AI / ML</option>
    </select>
  </div>

  <button>Create Account</button>
</div>

<script>
function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
