<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #87CEEB, #ffffff);
}

/* Form Card */
.container {
  width: 90%;
  max-width: 400px;
  background: #ffffff;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* Inputs */
.input-box {
  width: 100%;
  margin-bottom: 15px;
}

.input-box input,
.input-box select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

.input-box input:focus,
.input-box select:focus {
  border-color: #00bfff;
  box-shadow: 0 0 5px rgba(0,191,255,0.5);
}

/* Error */
.error {
  color: red;
  font-size: 13px;
  display: none;
}

/* Password eye */
.password-box {
  position: relative;
}

.password-box span {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* Gender */
.gender {
  margin: 10px 0;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(90deg, #00bfff, #87cefa);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}
</style>

</head>
<body>

<div class="container">
  <h2>Register</h2>

  <form id="form">

    <div class="input-box">
      <input type="text" id="name" placeholder="Enter your full name" required>
      <div class="error" id="nameError">Name is required</div>
    </div>

    <div class="input-box">
      <input type="email" id="email" placeholder="Enter your email" required>
      <div class="error" id="emailError">Valid email required</div>
    </div>

    <div class="input-box password-box">
      <input type="password" id="password" placeholder="Enter password" required minlength="6">
      <span onclick="togglePassword()">👁️</span>
      <div class="error" id="passError">Min 6 characters required</div>
    </div>

    <div class="gender">
      <label><input type="radio" name="gender" required> Male</label>
      <label><input type="radio" name="gender"> Female</label>
      <label><input type="radio" name="gender"> Other</label>
    </div>

    <div class="input-box">
      <select required>
        <option value="">Select Course</option>
        <option>Web Development</option>
        <option>App Development</option>
        <option>AI / ML</option>
      </select>
    </div>

    <button type="submit">Register Now</button>

  </form>
</div>

<script>
function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

document.getElementById("form").addEventListener("submit", function(e) {
  let valid = true;

  let name = document.getElementById("name");
  let email = document.getElementById("email");
  let password = document.getElementById("password");

  if (name.value.trim() === "") {
    document.getElementById("nameError").style.display = "block";
    valid = false;
  } else {
    document.getElementById("nameError").style.display = "none";
  }

  if (!email.checkValidity()) {
    document.getElementById("emailError").style.display = "block";
    valid = false;
  } else {
    document.getElementById("emailError").style.display = "none";
  }

  if (password.value.length < 6) {
    document.getElementById("passError").style.display = "block";
    valid = false;
  } else {
    document.getElementById("passError").style.display = "none";
  }

  if (!valid) {
    e.preventDefault();
  }
});
</script>

</body>
</html>
